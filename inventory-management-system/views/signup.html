<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory-Management-System</title>
    <link rel="stylesheet" href="/public/css/style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h3>Fill this form in order to Login</h3>
            <form class="form" id="login-form">
                <div class="sect">
                    <label for="nameSignup">Full Name</label>
                    <input type="text"  id="nameSignup" class="form-control">
                </div>
                <div class="sect">
                    <label for="EmailSignup">Email</label>
                    <input type="email"  id="EmailSignup" class="form-control">
                </div>
                <div class="sect">
                    <label for="username">Username</label>
                    <input type="text"  id="UsernameSignup" class="form-control">
                </div>
                <div class="sect">
                    <label for="Pwd">Password</label>
                    <input type="password" class="form-control" id="PwdSignup">
                </div>
                <div class="sect">
                    <label for="PwdSignupConfirm">Confirm Password</label>
                    <input type="password"  id="PwdSignupConfirm" class="form-control">
                </div>
            </form>
            <button type="submit" class="btn" id="submitBtn">Signup</button>
            <p>if you have an account <a href="login.html">click here to Login</a></p>
        </div>
    </div>
<script src="/public/js/auth.js"></script>
</body>
</html>
